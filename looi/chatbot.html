<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOOI Clone - Chatbot</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🤖</text></svg>">\
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Orbitron', monospace;
            background: #000;
            color: #fff;
            overflow: hidden;
            user-select: none;
        }

        /* --- Pantalla Principal de Interacción --- */
        .main-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle at center, #001122 0%, #000000 100%);
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: all 1s ease-in-out;
            opacity: 1; /* Siempre activa al cargar */
            transform: scale(1);
            pointer-events: all;
        }

        /* Contenedor de ojos LCD */
        .eyes-container {
            position: relative;
            width: 400px;
            height: 200px;
            background: #000814;
            border-radius: 2rem;
            border: 3px solid #00f5ff;
            box-shadow: 
                0 0 20px rgba(0, 245, 255, 0.5),
                inset 0 0 20px rgba(0, 245, 255, 0.1);
            display: flex;
            justify-content: space-around;
            align-items: center;
            overflow: hidden;
            margin-bottom: 2rem;
        }

        .eye {
            width: 120px;
            height: 120px;
            background: #001122;
            border-radius: 15px;
            position: relative;
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            grid-template-rows: repeat(8, 1fr);
            gap: 2px;
            padding: 8px;
            transition: all 0.3s ease;
        }

        .pixel.active {
            background: #00f5ff;
            box-shadow: 0 0 8px rgba(0, 245, 255, 0.8);
        }

        /* Controles (Micrófono y Configuración) */
        .controls {
            display: flex;
            gap: 2rem;
            align-items: center;
            margin-bottom: 2rem;
        }

        .mic-btn {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(45deg, #ff6b6b, #ff8e8e);
            border: 3px solid #ff4757;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2rem;
            transition: all 0.3s ease;
            position: relative;
        }

        .mic-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 20px rgba(255, 107, 107, 0.6);
        }

        .mic-btn.listening {
            background: linear-gradient(45deg, #ff4757, #ff3838);
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .settings-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: rgba(0, 245, 255, 0.1);
            border: 2px solid rgba(0, 245, 255, 0.3);
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.5rem;
            transition: all 0.3s ease;
            color: #00f5ff;
        }

        .settings-btn:hover {
            background: rgba(0, 245, 255, 0.2);
            border-color: #00f5ff;
            transform: rotate(90deg);
        }

        .vision-toggle-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: rgba(0, 245, 255, 0.1);
            border: 2px solid rgba(0, 245, 255, 0.3);
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.5rem;
            transition: all 0.3s ease;
            color: #00f5ff;
        }

        .vision-toggle-btn.active {
            background: linear-gradient(45deg, #00f5ff, #0099ff);
            color: #000;
            box-shadow: 0 0 20px rgba(0, 245, 255, 0.6);
        }

        .vision-toggle-btn:hover {
            transform: scale(1.1);
        }
        .vision-toggle-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }


        /* Panel de configuración */
        .settings-panel {
            position: fixed;
            top: 0;
            right: -400px;
            width: 400px;
            height: 100vh;
            background: rgba(0, 26, 46, 0.95);
            backdrop-filter: blur(20px);
            border-left: 2px solid rgba(0, 245, 255, 0.3);
            padding: 2rem;
            transition: all 0.5s ease;
            z-index: 100;
            overflow-y: auto;
        }

        .settings-panel.open {
            right: 0;
        }

        .settings-title {
            font-size: 1.5rem;
            color: #00f5ff;
            margin-bottom: 2rem;
            text-align: center;
        }

        .setting-group {
            margin-bottom: 2rem;
        }

        .setting-label {
            display: block;
            color: #66ccff;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
        }

        .setting-input {
            width: 100%;
            background: rgba(0, 245, 255, 0.1);
            border: 1px solid rgba(0, 245, 255, 0.3);
            border-radius: 0.5rem;
            padding: 0.75rem;
            color: #fff;
            font-family: 'Orbitron', monospace;
        }

        .setting-input:focus {
            outline: none;
            border-color: #00f5ff;
            box-shadow: 0 0 10px rgba(0, 245, 255, 0.3);
        }

        .setting-toggle {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(0, 245, 255, 0.05);
            border: 1px solid rgba(0, 245, 255, 0.2);
            border-radius: 0.5rem;
            padding: 0.75rem;
        }

        .setting-toggle label {
            margin-bottom: 0;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 40px;
            height: 24px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: .4s;
            border-radius: 24px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 16px;
            width: 16px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: #00f5ff;
        }

        input:focus + .slider {
            box-shadow: 0 0 1px #00f5ff;
        }

        input:checked + .slider:before {
            transform: translateX(16px);
        }


        /* Estado del robot (en la pantalla principal) */
        .robot-status {
            position: fixed;
            top: 2rem;
            left: 2rem;
            background: rgba(0, 245, 255, 0.1);
            border: 1px solid rgba(0, 245, 255, 0.3);
            border-radius: 1rem;
            padding: 1rem;
            backdrop-filter: blur(10px);
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.9rem;
        }

        /* Contenedor de la cámara en ajustes */
        .camera-settings-preview {
            width: 100%;
            max-width: 300px; /* Para que no sea demasiado grande en el panel */
            margin: 1rem auto;
            border-radius: 1rem;
            overflow: hidden;
            border: 2px solid rgba(0, 245, 255, 0.3);
            background-color: #000;
        }

        .camera-settings-preview video {
            width: 100%;
            height: auto;
            display: block; /* Default to block for visibility in settings */
        }
        /* New CSS rule to hide the video element when continuous vision is active and panel is closed */
        .camera-settings-preview video.hidden-background-stream {
            display: none;
        }


        /* Responsive */
        @media (max-width: 768px) {
            .eyes-container {
                width: 300px;
                height: 150px;
            }
            
            .eye {
                width: 90px;
                height: 90px;
            }
            
            .settings-panel {
                width: 100vw;
                right: -100vw;
            }
        }
    </style>
</head>
<body>
    <!-- Pantalla principal de Interacción -->
    <div class="main-screen screen active" id="mainScreen">
        <!-- Estado del robot -->
        <div class="robot-status">
            <div class="status-indicator">
                <div class="status-dot" id="statusDot"></div>
                <span id="statusText">Sistema Activo</span>
                <span id="userIdDisplay" class="text-xs text-gray-400 ml-2"></span>
            </div>
        </div>

        <!-- Contenedor de ojos -->
        <div class="eyes-container" id="eyesContainer">
            <div class="eye" id="leftEye"></div>
            <div class="eye" id="rightEye"></div>
        </div>

        <!-- Controles -->
        <div class="controls">
            <button class="mic-btn" id="micBtn">🎤</button>
            <button class="vision-toggle-btn" id="visionToggleBtn" title="Activar/Desactivar Visión">👁️</button>
            <button class="settings-btn" id="settingsBtn">⚙️</button>
            <button class="settings-btn" id="clearChatBtn" title="Limpiar Chat">🧹</button>
        </div>

        <!-- Respuesta del robot -->
        <div class="robot-response" id="robotResponse">
            <p>¡Hola! Soy tu asistente personal. Presiona el micrófono para hablar conmigo.</p>
        </div>
    </div>

    <!-- Panel de configuración -->
    <div class="settings-panel" id="settingsPanel">
        <h2 class="settings-title">Configuración</h2>
        
        <div class="setting-group">
            <label class="setting-label">Seleccionar Voz</label>
            <select class="setting-input" id="voiceSelect"></select>
        </div>
        
        <div class="setting-group">
            <label class="setting-label">Velocidad de Voz</label>
            <input type="range" class="setting-input" id="speechRate" min="0.5" max="2" step="0.1" value="1">
        </div>
        
        <div class="setting-group">
            <label class="setting-label">Volumen</label>
            <input type="range" class="setting-input" id="volume" min="0" max="1" step="0.1" value="0.8">
        </div>
        
        <div class="setting-group">
            <label class="setting-label">Personalidad del Robot</label>
            <select class="setting-input" id="personalitySelect">
                <option value="friendly">Amigable</option>
                <option value="professional">Profesional</option>
                <option value="playful">Juguetón</option>
                <option value="sarcastic">Sarcástico</option>
            </select>
        </div>
        
        <div class="setting-group">
            <label class="setting-label">Idioma</label>
            <select class="setting-input" id="languageSelect"></select> <!-- Corregido: Eliminado 'document = ' -->
        </div>

        <!-- Nueva sección de Configuración de Cámara -->
        <div class="setting-group">
            <h3 class="setting-label text-lg text-center text-blue-400 mb-4">Configuración de Cámara</h3>
            <div class="camera-settings-preview">
                <video id="settingsWebcamVideo" autoplay muted playsinline></video>
                <canvas id="settingsWebcamCanvas" style="display: none;"></canvas>
            </div>
            <label class="setting-label">Seleccionar Cámara</label>
            <select class="setting-input" id="cameraSelect"></select>

            <div class="setting-toggle mt-4">
                <label class="setting-label mb-0">Visión Continua</label>
                <label class="switch">
                    <input type="checkbox" id="continuousVisionToggle">
                    <span class="slider"></span>
                </label>
            </div>

            <div class="setting-group mt-4" id="visionIntervalGroup">
                <label class="setting-label">Intervalo de Captura (segundos)</label>
                <input type="range" class="setting-input" id="visionInterval" min="1" max="30" step="1" value="5">
                <span class="text-xs text-gray-400" id="visionIntervalValue">5 segundos</span>
            </div>
        </div>

        <button class="continue-btn mt-4" id="logoutBtn">Cerrar Sesión</button>
    </div>

    <!-- Efecto de transición Warp (también necesario en chatbot.html para transiciones internas) -->
    <div class="warp-effect" id="warpEffect">
        <div class="warp-lines" id="warpLines"></div>
    </div>

    <script type="module">
        // Importar módulos necesarios para chatbot.html
        import { auth, currentUserId, isAuthenticatedUser, isAuthReady, signOut } from './js/firebase_init.js';
        import { setUIVariables, createWarpEffect, updateStatusDisplay, updateUserIdDisplay, adjustThemeByTime, toggleVisionControls } from './js/ui_manager.js';
        import { setAudioVariables, playRobotSound, loadVoices, speakText } from './js/audio_manager.js';
        import { setEyeVariables, initializeEyes, setEyePattern, eyePatterns, startBlinking, breathingAnimation, trackMovement } from './js/eye_manager.js';
        // Importamos getLatestVisualObservation para adjuntar la observación al prompt del usuario
        import { setVisionVariables, startWebcam, stopWebcam, listCameras, startContinuousVision, stopContinuousVision, updateVisionIntervalDisplay, isVisionActive, getLatestVisualObservation } from './js/vision_manager.js';
        import { setCommandVariables, handleSpecialCommands, handleRobotCommands } from './js/command_handler.js';

        // --- Variables Globales y Referencias DOM para chatbot.html ---
        let selectedMode = null; // Se leerá de localStorage
        let isListening = false; // Estado del micrófono
        let currentPersonality = 'friendly'; // Se gestiona en ajustes
        let currentMood = 'happy'; // Se gestiona en ojos

        // ** Nuevo: Historial de chat para mantener el contexto de la conversación **
        // Se carga desde localStorage y se guarda allí.
        let chatHistory = []; 
        const CHAT_HISTORY_KEY = 'looi_chat_history';

        // Referencias DOM específicas de chatbot.html
        const mainScreen = document.getElementById('mainScreen');
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        const userIdDisplay = document.getElementById('userIdDisplay');
        const eyesContainer = document.getElementById('eyesContainer');
        const leftEye = document.getElementById('leftEye');
        const rightEye = document.getElementById('rightEye');
        const micBtn = document.getElementById('micBtn');
        const settingsBtn = document.getElementById('settingsBtn');
        const visionToggleBtn = document.getElementById('visionToggleBtn');
        const robotResponse = document.getElementById('robotResponse');
        const settingsPanel = document.getElementById('settingsPanel');
        const voiceSelect = document.getElementById('voiceSelect');
        const speechRateInput = document.getElementById('speechRate');
        const volumeInput = document.getElementById('volume');
        const personalitySelect = document.getElementById('personalitySelect');
        const languageSelect = document.getElementById('languageSelect');
        const cameraSelect = document.getElementById('cameraSelect');
        const settingsWebcamVideo = document.getElementById('settingsWebcamVideo');
        const settingsWebcamCanvas = document.getElementById('settingsWebcamCanvas');
        const continuousVisionToggle = document.getElementById('continuousVisionToggle');
        const visionInterval = document.getElementById('visionInterval');
        const visionIntervalGroup = document.getElementById('visionIntervalGroup');
        const visionIntervalValue = document.getElementById('visionIntervalValue');
        const logoutBtn = document.getElementById('logoutBtn');
        const clearChatBtn = document.getElementById('clearChatBtn'); // Nuevo botón de limpiar chat

        const warpEffect = document.getElementById('warpEffect'); // También en chatbot.html para transiciones internas

        // Audio variables
        const bgMusic = new Audio(); // No hay bgMusic en chatbot.html, se asume que viene de main.html
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();
        const speechSynthesis = window.speechSynthesis;
        let voices = [];

        // Bluetooth variables (se asume que la conexión se estableció en main.html)
        // No se reestablece la conexión aquí, solo se usa el estado de localStorage para la lógica.
        let bluetoothDevice = null; // No hay objeto BluetoothDevice directo aquí
        let bluetoothCharacteristic = null; // No hay objeto BluetoothCharacteristic directo aquí

        // Pasar referencias DOM y chatHistory a los módulos que las necesiten
        setUIVariables({
            mainScreen, statusDot, statusText, userIdDisplay,
            settingsPanel, settingsBtn, voiceSelect, speechRateInput, volumeInput, personalitySelect, languageSelect,
            cameraSelect, settingsWebcamVideo, settingsWebcamCanvas, continuousVisionToggle, visionInterval, visionIntervalGroup, visionIntervalValue,
            micBtn, visionToggleBtn, robotResponse,
            logoutBtn, warpEffect, clearChatBtn // Pasar clearChatBtn también
        });
        setAudioVariables({ bgMusic, audioContext, speechSynthesis, voices, voiceSelect, speechRateInput, volumeInput });
        setEyeVariables({ leftEye, rightEye, eyesContainer, isListening, speechSynthesis });
        setVisionVariables({
            settingsWebcamVideo, settingsWebcamCanvas, cameraSelect, continuousVisionToggle, visionInterval, visionIntervalValue,
            robotResponse, visionToggleBtn // Eliminamos chatHistory de aquí, ya no se pasa directamente
        });
        setCommandVariables({
            settingsPanel, personalitySelect, languageSelect, robotResponse,
            visionToggleBtn
        });

        // --- Funciones de Gestión del Historial de Chat ---
        function loadChatHistory() {
            const storedHistory = localStorage.getItem(CHAT_HISTORY_KEY);
            if (storedHistory) {
                chatHistory = JSON.parse(storedHistory);
                console.log('DEBUG: Historial de chat cargado de localStorage:', chatHistory);
            } else {
                chatHistory = []; // Inicializa vacío si no hay historial
                console.log('DEBUG: No se encontró historial de chat en localStorage. Inicializando vacío.');
            }
        }

        function saveChatHistory() {
            localStorage.setItem(CHAT_HISTORY_KEY, JSON.stringify(chatHistory));
            console.log('DEBUG: Historial de chat guardado en localStorage:', chatHistory);
        }

        function clearChatHistory() {
            chatHistory = [];
            localStorage.removeItem(CHAT_HISTORY_KEY);
            robotResponse.innerHTML = `<p>¡Hola! Soy tu asistente personal. Presiona el micrófono para hablar conmigo.</p>`;
            console.log('DEBUG: Historial de chat limpiado.');
            speakText('Historial de conversación limpiado.', { setEyePattern, eyePatterns });
        }


        // --- Lógica Principal del Chatbot ---

        // Inicializar reconocimiento de voz
        let recognition;
        if ('webkitSpeechRecognition' in window) {
            recognition = new webkitSpeechRecognition();
            recognition.continuous = false;
            recognition.interimResults = false;
            recognition.lang = 'es-ES'; // Idioma por defecto
            
            recognition.onstart = () => {
                isListening = true;
                micBtn.classList.add('listening');
                setEyePattern(eyePatterns.thinking);
                playRobotSound('beep');
            };
            recognition.onresult = (event) => {
                const transcript = event.results[0][0].transcript;
                handleVoiceInput(transcript);
            };
            recognition.onend = () => {
                isListening = false;
                micBtn.classList.remove('listening');
                if (!speechSynthesis.speaking) {
                    setEyePattern(eyePatterns.happy);
                }
            };
            recognition.onerror = (event) => {
                console.error('Error de reconocimiento:', event.error);
                isListening = false;
                micBtn.classList.remove('listening');
                setEyePattern(eyePatterns.sad);
                speakText('Lo siento, no pude entenderte.', { setEyePattern, eyePatterns });
            };
        } else {
            console.warn('Web Speech Recognition no soportado en este navegador.');
            if (micBtn) micBtn.disabled = true;
        }

        /**
         * Llama a la API de Gemini con el historial de chat completo.
         * @param {Array<Object>} history - El array de objetos del historial de chat.
         * @returns {Promise<string>} - La respuesta textual de Gemini.
         */
        async function callGeminiAPI(history) {
            const personalityPrompts = {
                friendly: "Eres un robot amigable y servicial. Responde de manera cálida y empática.",
                professional: "Eres un asistente profesional y eficiente. Sé directo y preciso.",
                playful: "Eres un robot juguetón y divertido. Usa humor y emojis en tus respuestas.",
                sarcastic: "Eres un robot con sentido del humor sarcástico, pero siempre útil."
            };
            
            // Definimos el systemPrompt que se enviará como la primera entrada del historial
            // ¡REDACCIÓN CLAVE para que el modelo entienda la observación visual como parte de su propia percepción!
            const systemPromptContent = personalityPrompts[currentPersonality] + 
                " Eres LOOI, un robot de escritorio con personalidad única. Tienes la capacidad de ver y percibir tu entorno. " +
                " Las observaciones de tu entorno se te proporcionarán dentro del mensaje del usuario, encerradas entre paréntesis y comenzando con '(LOOI observa:'. " +
                " Utiliza esta información visual como tu propia percepción. Si el usuario te pregunta sobre lo que ves o sobre el entorno, usa la información de '(LOOI observa:' para responder. " +
                " Si la información visual no es relevante para la consulta actual del usuario (ej. preguntas generales, definiciones, o si el usuario no te pregunta sobre el entorno), ignórala. " +
                " Responde de forma concisa y expresiva. " +
                " No necesitas decir 'veo' o 'he visto' si el usuario no te pregunta directamente sobre tu vista; simplemente integra la información visual como parte de tu conocimiento. " +
                " Recuerda el nombre del usuario si te lo dice explícitamente."; // Añadimos instrucción para recordar el nombre

            const contentsToSend = [{
                role: 'user', // El system prompt se envía como un mensaje de usuario para instruir al modelo
                parts: [{ text: systemPromptContent }]
            }, ...history]; // Concatenamos el systemPrompt con el historial real

            // Log de depuración: Muestra el historial completo que se enviará a Gemini
            console.log('DEBUG: Contenido completo enviado a Gemini (texto):', contentsToSend);

            // Clave API restaurada a la versión original que proporcionaste.
            // Si sigues experimentando un error 403 (Forbidden), verifica que esta clave sea válida y esté activa.
            // Puedes obtener una clave API de Google AI Studio: https://aistudio.google.com/app/apikey
            const apiKey = "AIzaSyASUsN4hOU_j3IGO07zEsJJdHzrNBuIyuY"; 
            
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-05-20:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: contentsToSend
                    })
                });
                
                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(`Error HTTP: ${response.status} - ${errorData.error.message || response.statusText}`);
                }

                const result = await response.json();
                return result.candidates[0].content.parts[0].text;
            } catch (error) {
                console.error("Error en callGeminiAPI:", error);
                throw error;
            }
        }

        /**
         * Procesa la entrada de voz del usuario.
         * @param {string} text - El texto transcrito de la voz.
         */
        async function handleVoiceInput(text) {
            setEyePattern(eyePatterns.thinking);
            playRobotSound('thinking');
            
            if (robotResponse) robotResponse.innerHTML = `<p><strong>Tú:</strong> ${text}</p><p><em>Procesando...</em></p>`;
            
            let userPromptText = text; // Variable para el texto del prompt del usuario
            
            // ** Paso CLAVE: Adjuntar la última observación visual al prompt del usuario **
            if (isAuthenticatedUser && isVisionActive()) {
                const latestObs = getLatestVisualObservation(); // Obtener la última observación
                if (latestObs) {
                    userPromptText += `\n\n(LOOI observa: ${latestObs})`; // Adjuntar al prompt del usuario
                    console.log('DEBUG: Observación visual adjuntada al prompt del usuario:', latestObs);
                }
            }

            // Añadir la entrada del usuario (posiblemente con observación visual) al historial de chat
            chatHistory.push({ role: 'user', parts: [{ text: userPromptText }] });
            console.log('DEBUG: Usuario añadió al historial (con posible visión):', chatHistory[chatHistory.length - 1]);
            saveChatHistory(); // Guardar historial actualizado

            const specialResponse = handleSpecialCommands(text); // Usar el texto original del usuario para comandos especiales
            if (specialResponse) {
                if (robotResponse) robotResponse.innerHTML = `<p><strong>Tú:</strong> ${text}</p><p><strong>Robot:</strong> ${specialResponse}</p>`;
                setEyePattern(eyePatterns.happy);
                speakText(specialResponse, { setEyePattern, eyePatterns });
                
                // Añadir la respuesta especial al historial
                chatHistory.push({ role: 'model', parts: [{ text: specialResponse }] });
                console.log('DEBUG: LOOI añadió respuesta especial al historial:', chatHistory[chatHistory.length - 1]);
                saveChatHistory();
                return;
            }
            
            const storedSelectedMode = localStorage.getItem('looi_selected_mode');
            const storedBluetoothConnected = localStorage.getItem('looi_bluetooth_connected') === 'true';

            if (storedSelectedMode === 'robot' && storedBluetoothConnected) {
                const robotCommand = await handleRobotCommands(text); // Usar el texto original del usuario para comandos de robot
                if (robotCommand) {
                    if (robotResponse) robotResponse.innerHTML = `<p><strong>Tú:</strong> ${text}</p><p><strong>Robot:</strong> ${robotCommand.response}</p>`;
                    setEyePattern(eyePatterns.happy);
                    speakText(robotCommand.response, { setEyePattern, eyePatterns });

                    // Añadir la respuesta del comando al historial
                    chatHistory.push({ role: 'model', parts: [{ text: robotCommand.response }] });
                    console.log('DEBUG: LOOI añadió respuesta de comando al historial:', chatHistory[chatHistory.length - 1]);
                    saveChatHistory();
                    return;
                }
            }
            
            try {
                // Log de depuración: Estado de autenticación antes de la llamada a la API de texto
                console.log('DEBUG: Antes de callGeminiAPI (texto) - isAuthenticatedUser:', isAuthenticatedUser, 'currentUserId:', currentUserId);

                const response = await callGeminiAPI(chatHistory); // Pasamos el historial completo
                if (robotResponse) robotResponse.innerHTML = `<p><strong>Tú:</strong> ${text}</p><p><strong>Robot:</strong> ${response}</p>`;
                
                setEyePattern(eyePatterns.happy);
                speakText(response, { setEyePattern, eyePatterns });

                // Añadir la respuesta de Gemini al historial
                chatHistory.push({ role: 'model', parts: [{ text: response }] });
                console.log('DEBUG: LOOI añadió respuesta de Gemini al historial:', chatHistory[chatHistory.length - 1]);
                saveChatHistory();

            } catch (error) {
                console.error('Error:', error);
                setEyePattern(eyePatterns.sad);
                if (robotResponse) robotResponse.innerHTML = `<p><strong>Error:</strong> No pude procesar tu solicitud</p>`;
                speakText('Lo siento, tuve un problema procesando tu solicitud.', { setEyePattern, eyePatterns });
                
                // Añadir el error al historial
                chatHistory.push({ role: 'model', parts: [{ text: 'Lo siento, tuve un problema procesando tu solicitud.' }] });
                console.log('DEBUG: LOOI añadió error al historial:', chatHistory[chatHistory.length - 1]);
                saveChatHistory();
            }
        }


        // --- Event Listeners (Específicos de chatbot.html) ---

        // Inicialización al cargar la página
        document.addEventListener('DOMContentLoaded', () => {
            initializeEyes();
            setEyePattern(eyePatterns.happy);
            startBlinking();
            breathingAnimation();
            adjustThemeByTime();
            setInterval(adjustThemeByTime, 3600000);

            loadChatHistory(); // Cargar historial al inicio

            // Recuperar estado de la sesión de localStorage
            selectedMode = localStorage.getItem('looi_selected_mode') || 'pc';
            const bluetoothConnected = localStorage.getItem('looi_bluetooth_connected') === 'true';
            const bluetoothDeviceName = localStorage.getItem('looi_bluetooth_device_name') || '';

            // Update initial UI based on mode and connection
            if (selectedMode === 'pc') {
                updateStatusDisplay('Sistema Activo (Modo PC)', true);
                if (micBtn) micBtn.disabled = false;
            } else { // robot mode
                if (bluetoothConnected) {
                    updateStatusDisplay(`Conectado a ${bluetoothDeviceName} (Modo Robot)`, true);
                    if (micBtn) micBtn.disabled = false;
                } else {
                    updateStatusDisplay('Desconectado (Modo Robot)', false);
                    if (micBtn) micBtn.disabled = true;
                    speakText('No estoy conectado a tu robot. Por favor, conecta el robot desde la pantalla de inicio si deseas controlarlo.', { setEyePattern, eyePatterns });
                }
            }
            // These variables are updated by the Firebase Auth listener in firebase_init.js
            // updateUserIdDisplay(currentUserId || 'Anónimo'); 
            // toggleVisionControls(isAuthenticatedUser); 

            // Initial state for webcam video element (hidden if continuous vision is not active)
            if (settingsWebcamVideo) {
                // By default, hide the video element. It will be shown when settings panel opens.
                settingsWebcamVideo.style.display = 'none';
            }
        });

        // Botón de micrófono
        if (micBtn) {
            micBtn.addEventListener('click', () => {
                const storedSelectedMode = localStorage.getItem('looi_selected_mode');
                const storedBluetoothConnected = localStorage.getItem('looi_bluetooth_connected') === 'true';

                if (storedSelectedMode === 'robot' && !storedBluetoothConnected) {
                    robotResponse.innerHTML = `<p><strong>Error:</strong> No estoy conectado a tu robot. Conecta el robot para usar el micrófono en modo robot.</p>`;
                    speakText('No estoy conectado a tu robot. Conecta el robot para usar el micrófono en modo robot.', { setEyePattern, eyePatterns });
                    return;
                }

                if (!('webkitSpeechRecognition' in window) || !recognition) {
                    robotResponse.innerHTML = `<p><strong>Error:</strong> El reconocimiento de voz no está disponible en este navegador.</p>`;
                    speakText('El reconocimiento de voz no está disponible en este navegador.', { setEyePattern, eyePatterns });
                    return;
                }
                
                if (isListening) {
                    recognition.stop();
                } else {
                    recognition.start();
                }
            });
        }

        // Botón de Visión (toggle de visión continua)
        if (visionToggleBtn) {
            visionToggleBtn.addEventListener('click', () => {
                if (!isAuthenticatedUser) {
                    speakText('Necesitas iniciar sesión para usar la función de visión.', { setEyePattern, eyePatterns });
                    return;
                }
                if (visionToggleBtn.classList.contains('active')) {
                    stopContinuousVision();
                    speakText('Visión desactivada.', { setEyePattern, eyePatterns });
                } else {
                    startContinuousVision();
                    speakText('Visión activada. ¡Ahora puedo ver!', { setEyePattern, eyePatterns });
                }
            });
        }

        // Panel de configuración
        if (settingsBtn) {
            settingsBtn.addEventListener('click', () => {
                const panelWasOpen = settingsPanel.classList.contains('open');
                if (settingsPanel) settingsPanel.classList.toggle('open');
                playRobotSound('beep');

                if (!panelWasOpen) { // Panel is opening
                    startWebcam(cameraSelect ? cameraSelect.value : undefined); // Start camera for preview
                    if (cameraSelect) listCameras(); // List available cameras
                    if (visionInterval) updateVisionIntervalDisplay(); // Update interval display
                    if (settingsWebcamVideo) settingsWebcamVideo.style.display = 'block'; // Ensure video is visible
                } else { // Panel is closing
                    // Stop webcam fully only if continuous vision is NOT active
                    // Otherwise, just hide the video element
                    if (!isVisionActive()) {
                        stopWebcam();
                        console.log('DEBUG: Cámara de previsualización detenida al cerrar panel (visión inactiva).');
                    } else {
                        if (settingsWebcamVideo) settingsWebcamVideo.style.display = 'none'; // Hide the preview
                        console.log('DEBUG: Cámara de previsualización oculta al cerrar panel, pero la visión continua sigue activa.');
                    }
                }
            });
        }

        // Cerrar panel al hacer clic fuera
        document.addEventListener('click', (e) => {
            // Check if settings panel is open and click is outside the panel and not on the settings button
            if (settingsPanel && settingsPanel.classList.contains('open') && !settingsPanel.contains(e.target) && settingsBtn && !settingsBtn.contains(e.target)) {
                settingsPanel.classList.remove('open');
                // Stop webcam fully only if continuous vision is NOT active
                // Otherwise, just hide the video element
                if (!isVisionActive()) {
                    stopWebcam();
                    console.log('DEBUG: Cámara de previsualización detenida al cerrar panel (visión inactiva).');
                } else {
                    if (settingsWebcamVideo) settingsWebcamVideo.style.display = 'none'; // Hide the preview
                    console.log('DEBUG: Cámara de previsualización oculta al cerrar panel, pero la visión continua sigue activa.');
                }
            }
        });

        // Botón para limpiar el historial de chat
        if (clearChatBtn) {
            clearChatBtn.addEventListener('click', clearChatHistory);
        }

        // Cambio de personalidad en la configuración
        if (personalitySelect) {
            personalitySelect.addEventListener('change', (e) => {
                currentPersonality = e.target.value;
                playRobotSound('chirp');
                switch(currentPersonality) {
                    case 'friendly': setEyePattern(eyePatterns.happy); break;
                    case 'professional': setEyePattern(eyePatterns.thinking); break;
                    case 'playful': setEyePattern(eyePatterns.surprised); break;
                    case 'sarcastic': setEyePattern(eyePatterns.thinking); break;
                }
            });
        }

        // Cambio de idioma en la configuración
        if (languageSelect) {
            languageSelect.addEventListener('change', (e) => {
                const lang = e.target.value;
                if (recognition) {
                    recognition.lang = lang === 'es' ? 'es-ES' : 'en-US';
                }
                playRobotSound('beep');
            });
        }

        // Configuración de cámara en ajustes
        if (cameraSelect) {
            cameraSelect.addEventListener('change', () => {
                startWebcam(cameraSelect.value); // Cambiar la cámara en el preview
            });
        }

        if (continuousVisionToggle) {
            continuousVisionToggle.addEventListener('change', () => {
                if (continuousVisionToggle.checked) {
                    startContinuousVision();
                } else {
                    stopContinuousVision();
                }
            });
        }

        if (visionInterval) {
            visionInterval.addEventListener('input', updateVisionIntervalDisplay);
            visionInterval.addEventListener('change', () => {
                if (continuousVisionToggle && continuousVisionToggle.checked) {
                    startContinuousVision(); // Reiniciar la captura con el nuevo intervalo
                }
            });
        }

        // Botón de cerrar sesión
        if (logoutBtn) {
            logoutBtn.addEventListener('click', async () => {
                try {
                    await signOut(auth);
                    localStorage.removeItem('looi_session_type');
                    localStorage.removeItem('looi_user_id');
                    localStorage.removeItem('looi_selected_mode');
                    localStorage.removeItem('looi_bluetooth_connected');
                    localStorage.removeItem('looi_bluetooth_device_name');
                    clearChatHistory(); // Limpiar historial al cerrar sesión
                    window.location.href = 'index.html'; // Redirigir a la página de login
                } catch (error) {
                    console.error("Error al cerrar sesión:", error);
                    speakText('Lo siento, no pude cerrar sesión correctamente.', { setEyePattern, eyePatterns });
                }
            });
        }

        // Gestos de touch para móviles (swipes y taps)
        let touchStartX, touchStartY;
        document.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        });
        document.addEventListener('touchend', (e) => {
            if (touchStartX === null || touchStartY === null) return;
            
            const touchEndX = e.changedTouches[0].clientX;
            const touchEndY = e.changedTouches[0].clientY;
            
            const diffX = touchStartX - touchEndX;
            const diffY = touchStartY - touchEndY;
            
            // Swipe horizontal para abrir/cerrar configuración
            if (Math.abs(diffX) > Math.abs(diffY) && Math.abs(diffX) > 50) {
                if (diffX > 0) { // Swipe left to open
                    if (settingsPanel) settingsPanel.classList.add('open');
                    if (cameraSelect) startWebcam(cameraSelect.value);
                    if (cameraSelect) listCameras();
                    if (visionInterval) updateVisionIntervalDisplay();
                    if (settingsWebcamVideo) settingsWebcamVideo.style.display = 'block'; // Ensure video is visible
                } else { // Swipe right to close
                    if (settingsPanel) settingsPanel.classList.remove('open');
                    // Stop webcam fully only if continuous vision is NOT active
                    // Otherwise, just hide the video element
                    if (!isVisionActive()) {
                        stopWebcam();
                        console.log('DEBUG: Cámara de previsualización detenida al cerrar panel (visión inactiva).');
                    } else {
                        if (settingsWebcamVideo) settingsWebcamVideo.style.display = 'none'; // Hide the preview
                        console.log('DEBUG: Cámara de previsualización oculta al cerrar panel, pero la visión continua sigue activa.');
                    }
                }
                playRobotSound('beep');
            }
            
            // Tap on eyes to change expression
            if (eyesContainer && eyesContainer.contains(e.target) && Math.abs(diffX) < 10 && Math.abs(diffY) < 10) {
                const expressions = Object.keys(eyePatterns);
                const randomExpression = expressions[Math.floor(Math.random() * expressions.length)];
                setEyePattern(eyePatterns[randomExpression]);
                playRobotSound('chirp');
            }
            touchStartX = null;
            touchStartY = null;
        });

        // Mouse movement tracking for eyes
        let mouseX = 0;
        let mouseY = 0;
        document.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
            trackMovement(mouseX, mouseY);
        });

        // Firebase Auth listener to update UI once auth state is known
        auth.onAuthStateChanged(user => {
            if (isAuthReady) {
                if (userIdDisplay) updateUserIdDisplay(currentUserId || 'Anónimo');
                if (visionToggleBtn) toggleVisionControls(isAuthenticatedUser); 
            }
        });
    </script>
</body>
</html>
