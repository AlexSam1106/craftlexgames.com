<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOOI Clone - Inicio de Sesión</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🤖</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Orbitron', monospace;
            background: #000;
            color: #fff;
            overflow: hidden;
            user-select: none;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: radial-gradient(circle at center, #00050A 0%, #000000 100%);
        }

        .login-container {
            text-align: center;
            background: rgba(0, 245, 255, 0.05);
            border: 2px solid rgba(0, 245, 255, 0.2);
            border-radius: 2rem;
            padding: 3rem;
            backdrop-filter: blur(15px);
            box-shadow: 0 0 50px rgba(0, 245, 255, 0.3);
            max-width: 500px;
            width: 90%;
        }

        .login-title {
            font-size: 3rem;
            font-weight: 900;
            background: linear-gradient(45deg, #00f5ff, #0099ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1.5rem;
            text-shadow: 0 0 20px rgba(0, 245, 255, 0.5);
        }

        .login-subtitle {
            font-size: 1.2rem;
            color: #66ccff;
            margin-bottom: 2.5rem;
        }

        .login-options {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .login-btn {
            background: linear-gradient(45deg, #00f5ff, #0099ff);
            border: none;
            border-radius: 2rem;
            padding: 1rem 3rem;
            font-size: 1.2rem;
            font-weight: 700;
            color: #000;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
        }

        .login-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0, 245, 255, 0.5);
        }

        .login-btn.secondary {
            background: rgba(0, 245, 255, 0.1);
            border: 2px solid rgba(0, 245, 255, 0.3);
            color: #00f5ff;
        }

        .login-btn.secondary:hover {
            background: rgba(0, 245, 255, 0.2);
            border-color: #00f5ff;
            box-shadow: 0 0 20px rgba(0, 245, 255, 0.4);
        }

        .login-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .error-message {
            color: #ff4757;
            margin-top: 1rem;
            font-size: 0.9rem;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .login-title {
                font-size: 2rem;
            }
            .login-btn {
                padding: 0.8rem 2rem;
                font-size: 1rem;
            }
        }
    </style>
</head>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        // Tu configuración de Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyCfHtxrEyTd5swf-B-2EuhgeCOvqTpXQiE",
            authDomain: "looibot.firebaseapp.com",
            projectId: "looibot",
            storageBucket: "looibot.firebasestorage.app",
            messagingSenderId: "386952285153",
            appId: "1:386952285153:web:a7cb3c183c36845f2420a0",
            measurementId: "G-P3XM5K8R5H"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const googleProvider = new GoogleAuthProvider();

        const googleLoginBtn = document.getElementById('googleLoginBtn');
        const anonymousLoginBtn = document.getElementById('anonymousLoginBtn');
        const loginErrorMsg = document.getElementById('loginErrorMsg');

        // Función para manejar el inicio de sesión y la redirección
        async function handleLogin(signInPromise, isAnonymous = false) {
            loginErrorMsg.textContent = '';
            googleLoginBtn.disabled = true;
            anonymousLoginBtn.disabled = true;
            googleLoginBtn.textContent = 'Iniciando...';
            anonymousLoginBtn.textContent = 'Iniciando...';

            try {
                const userCredential = await signInPromise;
                const user = userCredential.user;
                console.log("Inicio de sesión exitoso:", user.uid, "Anónimo:", user.isAnonymous);

                // Guardar el tipo de sesión en localStorage para que main.html lo sepa
                localStorage.setItem('looi_session_type', isAnonymous ? 'anonymous' : 'authenticated');
                localStorage.setItem('looi_user_id', user.uid); // Guardar el UID

                // Redirigir a la página principal
                window.location.href = 'main.html';

            } catch (error) {
                console.error("Error de inicio de sesión:", error);
                loginErrorMsg.textContent = `Error: ${error.message}`;
                googleLoginBtn.disabled = false;
                anonymousLoginBtn.disabled = false;
                googleLoginBtn.innerHTML = `<svg class="w-6 h-6" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">...</svg> Iniciar Sesión con Google`;
                anonymousLoginBtn.textContent = 'Continuar sin iniciar sesión';
            }
        }

        // Verificar si ya hay una sesión activa al cargar la página
        onAuthStateChanged(auth, (user) => {
            if (user) {
                // Si ya hay un usuario autenticado y no es una sesión anónima recién creada
                // (para evitar bucles si el usuario anónimo se crea y luego refresca)
                const sessionType = localStorage.getItem('looi_session_type');
                if (sessionType === 'authenticated' || (sessionType === 'anonymous' && user.isAnonymous)) {
                     console.log("Sesión existente detectada. Redirigiendo a main.html");
                     window.location.href = 'main.html';
                }
            }
        });


        // Event Listeners para los botones de login
        googleLoginBtn.addEventListener('click', () => handleLogin(signInWithPopup(auth, googleProvider), false));
        anonymousLoginBtn.addEventListener('click', () => handleLogin(signInAnonymously(auth), true));

        // Ajustar tema inicial (solo para la pantalla de login)
        function adjustThemeByTimeLogin() {
            const hour = new Date().getHours();
            let themeColor1, themeColor2;

            if (hour >= 6 && hour < 12) { // Mañana
                themeColor1 = '#00f5ff'; // Azul claro
                themeColor2 = '#0099ff'; // Azul medio
            } else if (hour >= 12 && hour < 18) { // Tarde
                themeColor1 = '#00ccff'; // Azul cielo
                themeColor2 = '#0066ff'; // Azul oscuro
            } else if (hour >= 18 && hour < 22) { // Atardecer/Noche temprana
                themeColor1 = '#ff6600'; // Naranja
                themeColor2 = '#ff0066'; // Rosa
            } else { // Noche
                themeColor1 = '#9900ff'; // Morado
                themeColor2 = '#0000ff'; // Azul oscuro
            }

            document.querySelectorAll('.login-title').forEach(el => {
                el.style.background = `linear-gradient(45deg, ${themeColor1}, ${themeColor2})`;
                el.style.webkitBackgroundClip = 'text';
                el.style.webkitTextFillColor = 'transparent';
                el.style.textShadow = `0 0 20px rgba(${parseInt(themeColor1.slice(1,3), 16)}, ${parseInt(themeColor1.slice(3,5), 16)}, ${parseInt(themeColor1.slice(5,7), 16)}, 0.5)`;
            });

            document.querySelectorAll('.login-subtitle').forEach(el => {
                el.style.color = themeColor1;
            });

            document.querySelectorAll('.login-container').forEach(el => {
                el.style.background = `rgba(${parseInt(themeColor1.slice(1,3), 16)}, ${parseInt(themeColor1.slice(3,5), 16)}, ${parseInt(themeColor1.slice(5,7), 16)}, 0.05)`;
                el.style.borderColor = `rgba(${parseInt(themeColor1.slice(1,3), 16)}, ${parseInt(themeColor1.slice(3,5), 16)}, ${parseInt(themeColor1.slice(5,7), 16)}, 0.2)`;
                el.style.boxShadow = `0 0 50px rgba(${parseInt(themeColor1.slice(1,3), 16)}, ${parseInt(themeColor1.slice(3,5), 16)}, ${parseInt(themeColor1.slice(5,7), 16)}, 0.3)`;
            });

            document.querySelectorAll('.login-btn').forEach(el => {
                if (!el.classList.contains('secondary')) {
                    el.style.background = `linear-gradient(45deg, ${themeColor1}, ${themeColor2})`;
                } else {
                    el.style.background = `rgba(${parseInt(themeColor1.slice(1,3), 16)}, ${parseInt(themeColor1.slice(3,5), 16)}, ${parseInt(themeColor1.slice(5,7), 16)}, 0.1)`;
                    el.style.borderColor = `rgba(${parseInt(themeColor1.slice(1,3), 16)}, ${parseInt(themeColor1.slice(3,5), 16)}, ${parseInt(themeColor1.slice(5,7), 16)}, 0.3)`;
                    el.style.color = themeColor1;
                }
            });
        }
        adjustThemeByTimeLogin(); // Aplicar tema al cargar la pantalla de login
        setInterval(adjustThemeByTimeLogin, 3600000); // Actualizar cada hora
    </script>
